name: 🔄 JustRunMy Auto Renew 未完成版

on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发 (每2天凌晨1点)
  schedule:
    - cron: 0 1 */2 * *

# 权限配置：允许提交和推送更改
permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROJECT_DIR: justrunmy
      SCRIPT_NAME: renew.py
      SCRIPT_DESC: JustRunMy 自动续期脚本
    
    steps:
      # 步骤 1: 检出公开仓库
      - name: 📥 检出公开仓库
        uses: actions/checkout@v4
      
      # 步骤 1.5: 创建输出目录
      - name: 📁 创建输出目录
        run: |
          mkdir -p ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/screenshots

      # 步骤 2: 检出私有仓库
      - name: 🔐 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: jyucoeng/auto-justrunmy-private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          fetch-depth: 1

      # 步骤 3: 设置 Python 环境
      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 步骤 4: 安装系统依赖
      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-noto-cjk

      # 步骤 5: 安装 Python 依赖
      - name: 📚 安装 Python 依赖
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests seleniumbase pyvirtualdisplay
          fi

      # 步骤 6: 安装 Hysteria2（如果需要代理）
      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ secrets.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi

      # 步骤 7: 添加随机延迟
      - name: ⏳ 添加随机延迟
        run: |
          delay=$((RANDOM % 120))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      # 步骤 8: 执行脚本
      - name: 🚀 执行 ${{ env.SCRIPT_DESC }}
        env:
          JUST_BATCH: ${{ secrets.JUST_BATCH }}
          HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
          SCREENSHOT_DIR: screenshots
        run: xvfb-run -a python ${{ env.SCRIPT_NAME }}
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}

      # 步骤 9: 上传截图
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_DIR }}-screenshots-${{ github.run_id }}
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/screenshots/
          retention-days: 7

      # 步骤 9.5: 清理本地截图
      - name:  🧹️ 清理本地截图
        if: always()
        run: |
          if [ -d "${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/screenshots" ]; then
            rm -rf ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/screenshots/*
            echo "✅ 本地截图已清理"
          fi

      # 步骤 10: 提交执行时间到公开库
      - name: ⏱️ 提交执行时间
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p ${{ env.PROJECT_DIR }} && echo "$(date +'%Y-%m-%d %H:%M:%S')" > ${{ env.PROJECT_DIR }}/time.txt
          git add ${{ env.PROJECT_DIR }}/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "⏱️ 更新 ${{ env.PROJECT_DIR }} 执行时间: $TIMESTAMP"
            git fetch origin main
            git push -f origin HEAD:main
            echo "✅ 更改已推送"
          fi

      # 步骤 11: 清理旧的工作流运行记录
      - name: 🧹 清理旧的工作流运行记录 
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
