name: 🔄 JustRunMy Auto Renew 未完成版

# 触发条件
on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发 (每2天凌晨2点)
  schedule:
    - cron: 5 2 */2 * *

# 权限配置：允许提交和推送更改
permissions:
  contents: write
  actions: write

# 工作流任务
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # ========== 需要用户配置的变量 ==========
      # ✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅
      # ✅              Secrets 配置开始                         
      # ✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅
      
      HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}                # Hysteria2 代理 URL（可选）
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}          # 私有仓库访问令牌（必须）
      JUST_BATCH: ${{ secrets.JUST_BATCH }}                          # 账户信息（必须）格式: email,passwd,tg_token,tg_chat_id（每行一个账号）
      SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}              # SOCKS 端口（默认 51080）
      
      # ✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅
      # ✅              Secrets 配置结束                          
      # ✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅
      
      # ========== 项目配置 ==========
      # ✅ 可以修改：这些配置可根据需要调整
      SCRIPT_DESC: JustRunMy 自动续期脚本（多账号版）    # 脚本描述
      SCREENSHOT_DIR: screenshots                     # 截图目录名
      MAX_DELAY_SECONDS: 120                          # 最大随机延迟秒数
      
      # ❗ 不建议修改：除非你知道自己在做什么
      PRIVATE_REPO: jyucoeng/auto-justrunmy-private   # 私有仓库地址
      PRIVATE_REPO_BRANCH: main                       # 私有仓库分支
      SCRIPT_NAME: justrunmy_renew.py                 # 脚本文件名

      # ❌ 不可修改：这些配置与项目结构强相关
      PROJECT_DIR: justrunmy                          # 项目目录名

      # ========== 动态变量 ==========
      # ⚠️ 自动获取：由 GitHub 自动填充，不需要修改
      REPO_OWNER: ${{ github.repository_owner }}      # 仓库所有者
      REPO_NAME: ${{ github.event.repository.name }}  # 仓库名称
    
    steps:
      # 步骤 1: 检出公开仓库
      # 说明：检出当前仓库的代码（工作流文件所在的仓库）
      - name: 📥 检出公开仓库
        uses: actions/checkout@v4
      
      # 步骤 1.5: 创建输出目录
      # 说明：创建用于存放截图的目录
      - name: 📁 创建输出目录
        run: |
          mkdir -p ${{ env.REPO_OWNER }}-${{ env.REPO_NAME }}-${{ env.PROJECT_DIR }}/${{ env.SCREENSHOT_DIR }}

      # 步骤 2: 检出私有仓库
      # 说明：检出包含账户信息的私有仓库
      # ⚠️ 需要配置 PRIVATE_REPO_TOKEN secret
      - name: 🔐 检出私有仓库
        uses: actions/checkout@v4
        with:
          # 仓库配置
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ env.PRIVATE_REPO_BRANCH }}
          
          # Secrets 配置
          token: ${{ env.PRIVATE_REPO_TOKEN }}
          
          # 路径配置
          path: ${{ env.REPO_OWNER }}-${{ env.REPO_NAME }}-${{ env.PROJECT_DIR }}
          fetch-depth: 1

      # 步骤 3: 设置 Python 环境
      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 步骤 4: 安装系统依赖
      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool scrot fonts-noto-cjk

      # 步骤 5: 安装 Python 依赖
      - name: 📚 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ${{ env.REPO_OWNER }}-${{ env.REPO_NAME }}-${{ env.PROJECT_DIR }}

      # 步骤 6: 安装 Hysteria2（如果需要代理）
      # 说明：根据 HY2_PROXY_URL 是否配置来决定是否安装代理工具
      # ⚠️ 需要配置 HY2_PROXY_URL secret（可选）
      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ env.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi

      # 步骤 7: 添加随机延迟
      # 说明：添加随机延迟以避免同时发起大量请求
      # 可通过修改 MAX_DELAY_SECONDS 来调整最大延迟时间
      - name: ⏳ 添加随机延迟
        run: |
          delay=$((RANDOM % ${{ env.MAX_DELAY_SECONDS }}))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      # 步骤 8: 执行脚本
      # 说明：运行自动续期脚本
      # ⚠️ 需要配置 JUST_BATCH secret
      - name: 🚀 执行 ${{ env.SCRIPT_DESC }}
        env:
          JUST_BATCH: ${{ env.JUST_BATCH }}
          HY2_PROXY_URL: ${{ env.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ env.SOCKS_PORT }}
          SCREENSHOT_DIR: ${{ env.SCREENSHOT_DIR }}
        run: python ${{ env.SCRIPT_NAME }}
        working-directory: ${{ env.REPO_OWNER }}-${{ env.REPO_NAME }}-${{ env.PROJECT_DIR }}

      # 步骤 9: 上传截图
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_DIR }}-screenshots-${{ github.run_id }}
          path: ${{ env.REPO_OWNER }}-${{ env.REPO_NAME }}-${{ env.PROJECT_DIR }}/${{ env.SCREENSHOT_DIR }}/
          retention-days: 7

      # 步骤 9.5: 清理本地截图
      - name:  🧹️ 清理本地截图
        if: always()
        run: |
          if [ -d "${{ env.REPO_OWNER }}-${{ env.REPO_NAME }}-${{ env.PROJECT_DIR }}/${{ env.SCREENSHOT_DIR }}" ]; then
            rm -rf ${{ env.REPO_OWNER }}-${{ env.REPO_NAME }}-${{ env.PROJECT_DIR }}/${{ env.SCREENSHOT_DIR }}/*
            echo "✅ 本地截图已清理"
          fi

      # 步骤 10: 提交执行时间到公开库
      - name: ⏱️ 提交执行时间
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p ${{ env.PROJECT_DIR }} && echo "$(date +'%Y-%m-%d %H:%M:%S')" > ${{ env.PROJECT_DIR }}/time.txt
          git add ${{ env.PROJECT_DIR }}/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "⏱️ 更新 ${{ env.PROJECT_DIR }} 执行时间: $TIMESTAMP"
            git fetch origin main
            git push -f origin HEAD:main
            echo "✅ 更改已推送"
          fi

      # 步骤 11: 清理旧的工作流运行记录
      # - name: 🧹 清理旧的工作流运行记录 
      #   uses: Mattraks/delete-workflow-runs@v2
      #   with:
      #     token: ${{ github.token }}
      #     repository: ${{ github.repository }}
      #     delete_workflow_pattern: ${{ github.workflow }}
      #     retain_days: 0
      #     keep_minimum_runs: 3
