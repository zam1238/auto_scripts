name: 🔄 BerryHost Auto Claim 多账号之guog
on:
  workflow_dispatch:
  schedule:
    - cron: '10 22 * * *'   # 每天 UTC 22:10（北京时间 06:10）
env:
  PROJECT_DIR: berryguog
  # BERRY_BATCH_ACCOUNTS 格式说明:
  # 每行一个账号，格式为: token|accountName,session_id[,tg_token,tg_chat_id]
  # 其中 token|accountName 中的 accountName 是可选的
  # 示例:
  #   token1|account1,session_id_1,tg_token_1,tg_chat_id_1
  #   token2|account2,session_id_2
  #   token3,session_id_3,tg_token_3,tg_chat_id_3
  BERRY_BATCH_ACCOUNTS: ${{ secrets.BERRY_BATCH_ACCOUNTS_GUOG }}
  HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
  SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
permissions:
  contents: write
concurrency:
  group: berry-claim
  cancel-in-progress: false
jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: 📥 检出公开库代码
        uses: actions/checkout@v4

      - name: 📥 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: jyucoeng/auto_berry_renew_private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          fetch-depth: 1

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ env.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi

      - name: 🐍 安装 Python 依赖
        run: |
          pip install requests[socks]

      - name: ⏳ 添加随机延迟
        run: |
          delay=$((RANDOM % 120))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      - name: 🎮 执行每日领取
        env:
          BERRY_BATCH_ACCOUNTS: ${{ env.BERRY_BATCH_ACCOUNTS }}
          HY2_PROXY_URL: ${{ env.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ env.SOCKS_PORT }}
        run: |
          cd ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          python berry.py

      - name: ⏱️ 提交执行时间到公开库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p ${{ env.PROJECT_DIR }} && echo "$(date +'%Y-%m-%d %H:%M:%S')" > ${{ env.PROJECT_DIR }}/time.txt
          git add ${{ env.PROJECT_DIR }}/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "⏱️ 更新 ${{ env.PROJECT_DIR }} 执行时间: $TIMESTAMP"
            git push origin main
            echo "✅ 更改已推送到公开库"
          fi
