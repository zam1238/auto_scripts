name: 🔄 Zampto Auto Renew

on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发
  schedule:
    # UTC 02:11 (北京时间 10:11) 每周日
    - cron: "11 2 * * 0"

# 权限配置：允许提交和推送更改
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROJECT_DIR: zampto
      SCRIPT_NAME: zampto_renew_batch.py
      SCRIPT_DESC: Zampto 续期脚本
    
    steps:
      # 步骤 1: 检出公开仓库
      - name: 📥 检出公开仓库
        uses: actions/checkout@v4
      
      # 步骤 1.5: 创建输出目录
      - name: 📁 创建输出目录
        run: mkdir -p ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
        working-directory: .
      
      # 步骤 2: 检出私有仓库
      - name: 🔐 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: jyucoeng/auto_zampto_private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          fetch-depth: 1

      # 步骤 3: 设置 Python 环境
      - name: 🐍 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "**/requirements.txt"

      # 步骤 4: 安装系统依赖
      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-noto-cjk fonts-noto-cjk-extra

      # 步骤 5: 安装 Python 依赖
      - name: 📚 安装 Python 依赖
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ 未找到 requirements.txt，跳过依赖安装"
          fi
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}

      # 步骤 5.5: 安装 Playwright 浏览器
      - name: 🌐 安装 Playwright 浏览器
        run: |
          python -m playwright install chromium
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}

      # 步骤 5.6: 安装 Hysteria2（如果需要代理）
      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ secrets.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi

      # 步骤 6: 添加随机延迟
      - name: ⏳ 添加随机延迟
        run: |
          delay=$((RANDOM % 120))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      # 步骤 7: 执行脚本
      - name: 🚀 执行 ${{ env.SCRIPT_DESC }}
        env:
          ZAMPTO_BATCH: ${{ secrets.ZAMPTO_BATCH }}
          ZAMPTO_SERVER_ID: ${{ secrets.ZAMPTO_SERVER_ID }}
          HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
          SCREENSHOT_DIR: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/screenshots
        run: xvfb-run -a python ${{ env.SCRIPT_NAME }}
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}

      # 步骤 8: 上传截图到 artifacts，7天内可下载压缩包，你可以自己改这个数字7
      - name: 📸 上传截图到 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zampto-screenshots
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/screenshots
          retention-days: 7
          if-no-files-found: warn

      # 步骤 9: 清理原始截图文件
      - name: 🧹 清理原始截图文件
        if: always()
        run: |
          OUTPUT_DIR="${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}"
          if [ -d "$OUTPUT_DIR/screenshots" ]; then
            echo "🧹 清理截图文件..."
            rm -f "$OUTPUT_DIR/screenshots"/*.png
            echo "✅ 截图文件已清理"
          else
            echo "⚠️ 截图目录不存在，无需清理"
          fi

      # 步骤 10: 提交时间文件到公开库
      - name: ⏱️ 提交时间文件
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p zampto && echo "$(date +'%Y-%m-%d %H:%M:%S')" > zampto/time.txt
          git add zampto/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "⏱️ 更新 zampto 时间文件: $TIMESTAMP"
            git fetch origin main
            git push -f origin HEAD:main
            echo "✅ 更改已推送"
          fi
